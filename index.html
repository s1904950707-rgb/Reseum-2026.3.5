<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人履歷 - 楊芮渼</title>

    <style>
        /* --- CSS 樣式區塊 --- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            color: #333;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 30px;
        }

        /* 照片樣式優化：設定大小並加上圓角與白邊 */
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .container {
            width: 80%;
            max-width: 800px;
            margin: 20px auto;
        }

        .section {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }

        h2 {
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
            color: #2c3e50;
        }

        ul {
            padding-left: 20px;
            line-height: 1.6;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background: #2980b9;
        }

        /* --- 深色模式 (Dark Mode) 樣式 --- */
        .dark {
            background: #1e1e1e;
            color: #eee;
        }

        .dark .section {
            background: #2c2c2c;
        }

        .dark h2 {
            color: #61baf2;
            border-bottom: 2px solid #61baf2;
        }

        .dark header {
            background: #111;
        }
    </style>
</head>

<body>

    <header>
        <img src="images/photo.jpg" alt="楊芮渼的個人照片" class="profile-pic">
        <h1>楊芮渼</h1>
        <p>亞洲大學學生</p>
        <p>學號：114018031</p>
        <button onclick="toggleMode()">切換深色模式</button>
    </header>

    <div class="container">

        <div class="section">
            <h2>個人簡介</h2>
            <p>
                我是亞洲大學的學生，目前就讀聽力暨語言治療學系一年級，對語言溝通與復健領域具有興趣，希望未來能運用專業知識，幫助有聽力，語言與溝通，吞嚥困難方面的人提升生活品質。
            </p>
        </div>

        <div class="section">
            <h2>學歷</h2>
            <ul>
                <li>亞洲大學 (Asia University)</li>
                <li>高中：XXX 高中</li>
            </ul>
        </div>

        <div class="section">
            <h2>技能</h2>
            <ul>
                <li>溝通與表達能力</li>
                <li>英文簡報</li>
                <li>團隊合作</li>
                <li>基礎程式設計 (HTML / JavaScript)</li>
            </ul>
        </div>

        <div class="section">
            <h2>聯絡方式</h2>
            <p>Email：example@email.com</p>
            <p>電話：09xx-xxx-xxx</p>
        </div>

    </div>

    <script>
        // --- JavaScript 互動區塊 ---
        function toggleMode() {
            // 切換 body 的 class 來達成深色/淺色模式轉換
            document.body.classList.toggle("dark");
        }
    </script>

</body>
</html>
