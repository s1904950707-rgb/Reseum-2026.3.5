<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人履歷 - 楊芮渼</title>

  <style>
        /* --- 基礎設定 & 重設 --- */
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            color: #333;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- 頁首 (Header) --- */
        header {
            background: #1e2a3b;
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            margin-bottom: 15px;
        }

        header h1 { margin: 10px 0; font-size: 32px; letter-spacing: 2px; }
        header p { margin: 5px 0; opacity: 0.9; font-size: 16px; }

        button {
            background: transparent; color: white; border: 2px solid white;
            padding: 8px 16px; border-radius: 5px; cursor: pointer;
            margin-top: 15px; transition: 0.3s;
        }
        button:hover { background: rgba(255,255,255,0.1); }

        /* --- 主內容容器 (網格排版) --- */
        .container {
            width: 90%; max-width: 1000px;
            margin: 20px auto 40px auto;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px; position: relative;
        }

        /* 偽造左側深色背景 */
        .container::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 280px; height: 100%; background: #1e2a3b;
            z-index: -1; border-radius: 8px;
        }

        /* --- 區塊通用設定 --- */
        .section {
            background: transparent; padding: 0; margin-bottom: 0;
            border-radius: 0; box-shadow: none;
        }

        /* --- 透過 nth-child 重新排列版面 (不改 HTML 的魔法) --- */
        /* 第 1 個區塊：個人簡介 (移到右側) */
        .container .section:nth-child(1) {
            grid-column: 2; grid-row: 1 / span 4;
            background: white; padding: 30px; border-radius: 8px;
            border-left: 5px solid #3498db;
        }
        .container .section:nth-child(1) h2 {
            border-bottom: 2px solid #3498db; padding-bottom: 5px;
            color: #1e2a3b; margin-bottom: 20px;
        }

        /* 第 4 個區塊：聯絡方式 (移到左側最上方) */
        .container .section:nth-child(4) { grid-column: 1; grid-row: 1; color: white; padding: 20px; }
        
        /* 第 2 個區塊：學歷 (移到左側中間) */
        .container .section:nth-child(2) { grid-column: 1; grid-row: 2; color: white; padding: 20px; }
        
        /* 第 3 個區塊：技能 (移到左側下方) */
        .container .section:nth-child(3) { grid-column: 1; grid-row: 3; color: white; padding: 20px; }

        /* 左側側邊欄內的元素樣式 */
        .container .section:nth-child(2) h2,
        .container .section:nth-child(3) h2,
        .container .section:nth-child(4) h2 {
            color: white; border-bottom: 2px solid white;
            padding-bottom: 10px; font-size: 22px; margin-bottom: 20px;
        }
        
        .container .section:nth-child(2) ul,
        .container .section:nth-child(3) ul { padding-left: 15px; list-style-type: disc; }
        .container .section:nth-child(2) ul, .container .section:nth-child(3) ul,
        .container .section:nth-child(4) p { font-size: 15px; color: rgba(255,255,255,0.8); }

        /* --- 深色模式 --- */
        .dark { background: #1e1e1e; color: #eee; }
        .dark header { background: #111; }
        .dark .container::before { background: #2c2c2c; }
        
        .dark .container .section:nth-child(1) { background: #2c2c2c; border-left: 5px solid #61baf2; }
        .dark .container .section:nth-child(1) h2 { color: #61baf2; border-bottom: 2px solid #61baf2; }
        
        .dark .container .section:nth-child(2),
        .dark .container .section:nth-child(3),
        .dark .container .section:nth-child(4) { color: #eee; }
        
        .dark .container .section:nth-child(2) h2,
        .dark .container .section:nth-child(3) h2,
        .dark .container .section:nth-child(4) h2 { border-bottom: 2px solid #eee; }
    </style>
</head>

<body>

    <header>
        <img src="images/photo.jpg" alt="楊芮渼的個人照片" class="profile-pic">
        <h1>楊芮渼</h1>
        <p>亞洲大學學生</p>
        <p>學號：114018031</p>
        <button onclick="toggleMode()">切換深色模式</button>
    </header>

    <div class="container">

        <div class="section">
            <h2>個人簡介</h2>
            <p>
                我是亞洲大學的學生，目前就讀聽力暨語言治療學系一年級，對語言溝通與復健領域具有興趣，希望未來能運用專業知識，幫助有聽力，語言與溝通，吞嚥困難方面的人提升生活品質。
            </p>
        </div>

        <div class="section">
            <h2>學歷</h2>
            <ul>
                <li>亞洲大學 (Asia University)</li>
                <li>高中：XXX 高中</li>
            </ul>
        </div>

        <div class="section">
            <h2>技能</h2>
            <ul>
                <li>溝通與表達能力</li>
                <li>英文簡報</li>
                <li>團隊合作</li>
                <li>基礎程式設計 (HTML / JavaScript)</li>
            </ul>
        </div>

        <div class="section">
            <h2>聯絡方式</h2>
            <p>Email：example@email.com</p>
            <p>電話：09xx-xxx-xxx</p>
        </div>

    </div>

    <script>
        // --- JavaScript 互動區塊 ---
        function toggleMode() {
            // 切換 body 的 class 來達成深色/淺色模式轉換
            document.body.classList.toggle("dark");
        }
    </script>

<audio id="bgm" autoplay loop playsinline>
  <source src="mp3/兩分鐘城市清晨配樂.mp3" type="audio/mpeg">
</audio>

<script>
  const audio = document.getElementById("bgm");

  // 嘗試直接播放
  audio.play().catch(() => {
    // 若被擋，快速解除靜音再播放
    audio.muted = true;
    audio.play();

    setTimeout(() => {
      audio.muted = false;
    }, 100);
  });
</script>

</body>
</html>
